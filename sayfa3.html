<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md text-body-md" data-page="style-settings">
  <header class="bg-[#F4F4F1] dark:bg-stone-950 flex justify-between items-center w-full px-6 py-4 border-b border-stone-200 dark:border-stone-800 transition-opacity duration-200 active:opacity-70 sticky top-0 z-40">
    <div class="flex items-center gap-4">
      <a class="text-[#5F7A76] hover:bg-stone-100 rounded-full w-10 h-10 flex items-center justify-center transition-colors" href="./sayfa1.html" aria-label="Planlayıcıya dön">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
    </div>
    <div class="font-serif italic text-2xl tracking-tight text-[#5F7A76] text-center flex-grow">
      Çalışma Günlüğü
    </div>
    <div class="w-10 h-10"></div>
  </header>

  <main class="flex-grow w-full max-w-[800px] mx-auto px-gutter py-lg pb-32 flex flex-col gap-lg">
    <header class="mb-4">
      <h1 class="font-h1 text-h1 text-on-surface mb-xs">Defter Stili</h1>
      <p class="font-body-lg text-body-lg text-on-surface-variant max-w-lg">
        Çalışma günlüğündeki sayfa dokusunu ve düzenini istediğin gibi seç.
      </p>
    </header>

    <div class="feedback-message hidden" id="style-message" role="status" aria-live="polite"></div>

    <section class="bg-surface rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-outline-variant overflow-hidden flex flex-col">
      <button class="style-option flex items-center justify-between p-md bg-surface-container-lowest border-b border-outline-variant cursor-pointer hover:bg-surface-bright transition-colors relative group text-left" data-active="false" data-style="lined" data-style-option="lined" type="button">
        <div class="absolute left-0 top-0 bottom-0 w-1 bg-primary" data-style-bar></div>
        <div class="flex items-center gap-md">
          <div aria-hidden="true" class="w-[72px] h-[96px] bg-[#fdfdfc] border border-outline-variant/60 rounded shadow-sm relative overflow-hidden flex flex-col flex-shrink-0">
            <div class="absolute left-4 top-0 bottom-0 w-[1px] bg-error/30"></div>
            <div class="w-full h-[1px] bg-secondary-fixed-dim/50 mt-4"></div>
            <div class="w-full h-[1px] bg-secondary-fixed-dim/50 mt-3"></div>
            <div class="w-full h-[1px] bg-secondary-fixed-dim/50 mt-3"></div>
            <div class="w-full h-[1px] bg-secondary-fixed-dim/50 mt-3"></div>
            <div class="w-full h-[1px] bg-secondary-fixed-dim/50 mt-3"></div>
          </div>
          <div>
            <h3 class="font-h3 text-h3 text-on-surface mb-1">Çizgili Sayfa</h3>
            <p class="font-body-md text-body-md text-on-surface-variant">Klasik yatay çizgiler; uzun notlar ve ders özetleri için idealdir.</p>
          </div>
        </div>
        <div class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 ml-4 transition-colors" data-style-indicator>
          <span class="material-symbols-outlined text-[16px] font-bold">check</span>
        </div>
      </button>

      <button class="style-option flex items-center justify-between p-md border-b border-outline-variant cursor-pointer hover:bg-surface-bright transition-colors group text-left" data-active="false" data-style="grid" data-style-option="grid" type="button">
        <div class="absolute left-0 top-0 bottom-0 w-1 bg-primary" data-style-bar></div>
        <div class="flex items-center gap-md">
          <div aria-hidden="true" class="w-[72px] h-[96px] bg-[#fdfdfc] border border-outline-variant/60 rounded shadow-sm relative overflow-hidden flex flex-shrink-0" style="background-image: linear-gradient(to right, rgba(182, 201, 215, 0.4) 1px, transparent 1px), linear-gradient(to bottom, rgba(182, 201, 215, 0.4) 1px, transparent 1px); background-size: 8px 8px;">
          </div>
          <div>
            <h3 class="font-h3 text-h3 text-on-surface mb-1">Kareli Sayfa</h3>
            <p class="font-body-md text-body-md text-on-surface-variant">Hafif kareli doku; şema, matematik ve düzenli yerleşim için uygundur.</p>
          </div>
        </div>
        <div class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 ml-4 transition-colors" data-style-indicator>
          <span class="material-symbols-outlined text-[16px] font-bold">check</span>
        </div>
      </button>

      <button class="style-option flex items-center justify-between p-md cursor-pointer hover:bg-surface-bright transition-colors group text-left" data-active="false" data-style="plain" data-style-option="plain" type="button">
        <div class="absolute left-0 top-0 bottom-0 w-1 bg-primary" data-style-bar></div>
        <div class="flex items-center gap-md">
          <div aria-hidden="true" class="w-[72px] h-[96px] bg-[#fdfdfc] border border-outline-variant/60 rounded shadow-sm flex flex-shrink-0"></div>
          <div>
            <h3 class="font-h3 text-h3 text-on-surface mb-1">Düz Not Modu</h3>
            <p class="font-body-md text-body-md text-on-surface-variant">Tamamen boş bir alan; serbest not alma ve zihin haritası için uygundur.</p>
          </div>
        </div>
        <div class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 ml-4 transition-colors" data-style-indicator>
          <span class="material-symbols-outlined text-[16px] font-bold">check</span>
        </div>
      </button>
    </section>

    <div class="flex flex-wrap justify-end gap-sm pt-sm">

    <a class="nav-link flex flex-col items-center justify-center scale-95 active:scale-90 transition-transform w-[88px]" data-active="false" href="./sayfa1.html">

      <span class="font-serif text-[11px] uppercase tracking-wider">Planlayıcı</span>
    </a>
    <a class="nav-link flex flex-col items-center justify-center scale-95 active:scale-90 transition-transform w-[88px]" data-active="false" href="./sayfa2.html">
      <span class="material-symbols-outlined mb-1">add_circle</span>
      <span class="font-serif text-[11px] uppercase tracking-wider">Yeni Görev</span>
    </a>

    </a>
  </nav>
